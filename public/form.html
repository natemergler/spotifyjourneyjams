<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spotify Journey</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page2">

<div class="container">
  <form id="inputs" action="/submit" method="POST">
    <div class="input-container">
        <input type="text" id="startingPoint" name="startingPoint" placeholder="Enter Starting Point">
    </div>
    
    <div class="input-container">
        <input type="text" id="destination" name="destination" placeholder="Enter Destination">
    </div>
    
    <div class="input-container">
        <input type="text" id="artist" name="artist" placeholder="Enter Artist">
    </div>
    
    <button class="button" type="submit">Submit</button>
</form>

</div>

</body>
</html>
